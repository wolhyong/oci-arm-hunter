name: OCI ARM Instance Hunter

on:
  schedule:
    # 매 5분마다 실행 (GitHub Actions 최소 간격)
    - cron: "*/5 * * * *"
  workflow_dispatch:  # 수동 실행 버튼

jobs:
  hunt:
    name: 🔍 ARM 인스턴스 자리 탐색
    runs-on: ubuntu-latest
    timeout-minutes: 4   # 5분 주기보다 짧게 설정해 중복 방지

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 의존성 설치
        run: pip install oci

      - name: 🤖 Hunter 실행
        env:
          # ── OCI 인증 ─────────────────────────────────────────
          OCI_TENANCY_OCID:      ${{ secrets.OCI_TENANCY_OCID }}
          OCI_USER_OCID:         ${{ secrets.OCI_USER_OCID }}
          OCI_FINGERPRINT:       ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY:       ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_REGION:            ${{ secrets.OCI_REGION }}
          # ── 인스턴스 설정 ────────────────────────────────────
          OCI_COMPARTMENT_ID:    ${{ secrets.OCI_COMPARTMENT_ID }}
          OCI_AD:                ${{ secrets.OCI_AD }}
          OCI_SUBNET_ID:         ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID:          ${{ secrets.OCI_IMAGE_ID }}
          OCI_SSH_PUBLIC_KEY:    ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          OCI_INSTANCE_NAME:     ${{ secrets.OCI_INSTANCE_NAME }}
          OCI_SHAPE:             "VM.Standard.A1.Flex"
          OCI_OCPUS:             "4"
          OCI_MEMORY_GB:         "24"
          OCI_BOOT_VOLUME_GB:    "50"
          # ── 재시도: Actions 1회 실행당 1번만 시도 ─────────────
          MAX_RETRIES:           "1"
          RETRY_INTERVAL_SEC:    "5"
          # ── 알림 (선택) ──────────────────────────────────────
          NTFY_TOPIC:            ${{ secrets.NTFY_TOPIC }}
          TELEGRAM_TOKEN:        ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/hunter.py

      - name: ✅ 성공 — Workflow 비활성화
        if: success() && steps.hunt.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            // 인스턴스 생성 성공 시 workflow를 자동으로 비활성화
            await github.rest.actions.disableWorkflow({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              workflow_id: 'hunt.yml',
            });
            console.log('✅ Workflow 비활성화 완료 — 더 이상 실행되지 않습니다.');
